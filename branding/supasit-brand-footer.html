<!--
  Supasit@1981th brand footer — reusable drop-in snippet.

  HOW TO USE IN A NEW APP:
  1. Copy the <style> block below into your app's <head> (or merge the rules
     into your existing stylesheet).
  2. Copy the <div class="brand-footer">...</div> markup so it sits right
     before your closing </body> tag.
  3. By default this pins itself to the very bottom of the viewport
     (`bottom: 0`). If your app already has its own fixed bottom nav/toolbar,
     change the one line `bottom: 0;` in `.brand-footer` to
     `bottom: <your-nav-height>;` (e.g. `bottom: 60px;`) so the two don't
     overlap, and add that same height to your page's bottom padding.
  4. No external fonts or images required — everything is plain CSS shapes.
-->
<style>
  .brand-footer {
    position: fixed; left: 0; right: 0; bottom: 0; /* adjust bottom offset if you have a bottom nav */
    height: 34px;
    background: #FFFFFF;
    border-top: 1px solid #E5E7EB;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    z-index: 25;
  }
  .brand-flag {
    width: 22px; height: 22px; border-radius: 5px; overflow: hidden;
    display: flex; flex-direction: column; flex-shrink: 0;
  }
  .brand-flag div:nth-child(1) { flex: 1; background: #A51931; }
  .brand-flag div:nth-child(2) { flex: 1; background: #F4F5F8; }
  .brand-flag div:nth-child(3) { flex: 2; background: #2D2A4A; }
  .brand-flag div:nth-child(4) { flex: 1; background: #F4F5F8; }
  .brand-flag div:nth-child(5) { flex: 1; background: #A51931; }
  .brand-name {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-weight: 700; font-size: 12px;
    color: #111827; letter-spacing: -0.01em; white-space: nowrap;
  }
  .brand-name span { font-family: monospace; font-weight: 500; color: oklch(0.58 0.19 280); }
  .brand-paws { position: relative; width: 20px; height: 17px; flex-shrink: 0; }
  .brand-paw { position: absolute; width: 11px; height: 11px; }
  .brand-paw:nth-child(1) { left: 0; top: 4px; transform: rotate(-18deg); }
  .brand-paw:nth-child(2) { left: 9px; top: -1px; transform: rotate(14deg); }
  .brand-paw span {
    position: absolute; border-radius: 50%; background: oklch(0.68 0.16 50);
  }
  .brand-paw .pad { left: 2px; top: 4px; width: 7px; height: 5px; }
  .brand-paw .toe1 { left: 0; top: 1px; width: 3px; height: 3px; }
  .brand-paw .toe2 { left: 2.5px; top: -1px; width: 3px; height: 3.5px; }
  .brand-paw .toe3 { left: 5.5px; top: -1px; width: 3px; height: 3.5px; }
  .brand-paw .toe4 { left: 8px; top: 1px; width: 3px; height: 3px; }
</style>

<div class="brand-footer">
  <div class="brand-flag"><div></div><div></div><div></div><div></div><div></div></div>
  <span class="brand-name">Supasit<span>@1981th</span></span>
  <div class="brand-paws">
    <div class="brand-paw"><span class="pad"></span><span class="toe1"></span><span class="toe2"></span><span class="toe3"></span><span class="toe4"></span></div>
    <div class="brand-paw"><span class="pad"></span><span class="toe1"></span><span class="toe2"></span><span class="toe3"></span><span class="toe4"></span></div>
  </div>
</div>
